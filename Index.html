<!DOCTYPE html>
<html>
<head>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Roast Me 😈</title>

  <style>
    body {
      font-family: Arial;
      background: linear-gradient(135deg, #141e30, #243b55);
      color: white;
      text-align: center;
      padding: 30px;
    }

    h2 {
      font-size: 28px;
    }

    input {
      padding: 12px;
      width: 80%;
      border-radius: 10px;
      border: none;
      margin-top: 10px;
    }

    select {
      padding: 10px;
      border-radius: 10px;
      margin-top: 10px;
    }

    button {
      padding: 12px 20px;
      border: none;
      border-radius: 10px;
      background: #ff4b2b;
      color: white;
      margin-top: 15px;
      cursor: pointer;
    }

    button:hover {
      background: #ff416c;
    }

    #output {
      margin-top: 25px;
      font-size: 20px;
      background: rgba(255,255,255,0.1);
      padding: 15px;
      border-radius: 10px;
      opacity: 0;
      transition: 0.4s;
    }

    .show {
      opacity: 1 !important;
      transform: scale(1.05);
    }
    button:active {
  transform: scale(0.95);
}
  </style>
</head>

<body>

  <h2>🔥 Roast Me App</h2>

  <input id="name" placeholder="Enter your name">

  <br>

  <select id="mode">
    <option value="normal">😄 Normal</option>
    <option value="savage">🔥 Savage</option>
    <option value="brutal">☠️ Brutal</option>
  </select>

  <br>

  <button onclick="roast()">Roast Me 😈</button>
  <button onclick="roast()">Roast Again 🔁</button>

  <p id="output"></p>
  <div id="infoBox" style="display:none; margin-top:20px; background:rgba(255,255,255,0.1); padding:15px; border-radius:10px;">
  <h3>About This App 😈</h3>
  <p>This is a fun Roast Generator app 🔥</p>
  <p>Generate savage, funny roasts and share with friends 😂</p>
  <p>Made by Ashok mk😎</p>
</div>
  <button onclick="copyText()">Copy 📋</button>
  <button onclick="share()">Share 😂</button>
  <button onclick="toggleInfo()">ℹ️ Info</button>
<p style="margin-top:30px; font-size:12px; opacity:0.6;">
  © 2026 Roast Me App 😈
</p>
  <script>
    function roast() {
      let name = document.getElementById("name").value;
      let mode = document.getElementById("mode").value;
      let output = document.getElementById("output");

      if (name === "") {
        output.innerText = "Enter a name first 😅";
        output.classList.add("show");
        return;
      }

      let normal = [
        name + " is like WiFi… weak but trying 📶",
        name + " dreams big but sleeps bigger 😴"
      ];

      let savage = [
        name + " confidence 100%, talent 0% 😂",
        name + " acts like king but wallet says no 👑"
      ];

      let brutal = [
        name + " brain loading... still buffering forever ⏳",
        name + " is proof that mistakes survive ☠️"
      ];

      let selected;

      if (mode === "normal") selected = normal;
      if (mode === "savage") selected = savage;
      if (mode === "brutal") selected = brutal;

      let result = selected[Math.floor(Math.random() * selected.length)];

      output.innerText = result;
      output.classList.remove("show");

      setTimeout(() => {
        output.classList.add("show");
      }, 100);
    }

    function copyText() {
      let text = document.getElementById("output").innerText;

      if (!text) {
        alert("Generate a roast first 😅");
        return;
      }

      navigator.clipboard.writeText(text);
      alert("Copied 😈");
    }

    function share() {
      let text = document.getElementById("output").innerText;

      if (!text || text.trim() === "") {
        alert("Generate a roast first 😅");
        return;
      }

      let message = "🔥 Roast Me App 😈\n\n" + text;

      if (navigator.share) {
        navigator.share({
          title: "Roast Me 😈",
          text: message
        });
      } else {
        let url = "https://wa.me/?text=" + encodeURIComponent(message);
        window.location.href = url;
      }
    }
    function toggleInfo() {
  let box = document.getElementById("infoBox");

  if (box.style.display === "none") {
    box.style.display = "block";
  } else {
    box.style.display = "none";
  }
}
  </script>

</body>
</html>
